<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Оно тебе надо — аукцион вещей, в которые никто не верил</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="fonts/fonts.css">
  </head>
  <body>
    <header class="header">
      <nav class="menu">
        <ul>
          <li>
            <p>главная</p>
            <p>посмотреть лоты</p>
            <p>об аукционе</p>
          </li>
        </ul>
      </nav>
      <a class="logo">
        <img
        class="logo-image"
        src="images/logo-black.svg"
        alt="Логотип"
        />
      </a>
      <address class="contacts"></address>
    </header>
    <main>
      <div class="cover">
        <div class="overlay">
          <div class="title">
            <span>
              <p>оно</p>
            </span>
            <span class="center-span">
              <p>тебе</p>
            </span>
            <span class="right-span">
              <p>надо</p>
            </span>
          </div>
          <div class="description">
            <span class="des-text">аукцион вещей, в которые никто не верил</span>
            <button class="button"><p class="button-text">сделать ставку</p></button>
          </div>
        </div>
      </div>
      <div class="lots">
        <h1 class="title"></h1>
        <div class="lot-cards">
          <div class="card"></div>
          <div class="card"></div>
          <div class="card"></div>
        </div>
        <blockquote></blockquote>
      </div>
      <div class="about">
        <div class="logo"></div>
        <div class="about-column"></div>
      </div>
    </main>
    <footer class="footer">
      <div class="contacts"></div>
      <div class="menu"></div>
      <div class="socials"></div>
    </footer>
  </body>
</html>
